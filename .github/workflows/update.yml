name: 自動更新股市儀表板

on:
  schedule:
    # 每天 UTC 時間 22:00 執行 (約香港時間早上 06:00，美股收盤後)
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # 允許在網頁上手動按鈕觸發

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許機器人把產生的 HTML 存回專案

    steps:
    - name: 下載最新的程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝必要的套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行 Python 腳本抓取資料並生成網頁
      run: python generate_real_dashboard.py

    - name: 將最新生成的 index.html 提交到 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新：最新股市真實數據" && git push)
